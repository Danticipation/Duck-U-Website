[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  # Firebase public web config is intentionally client-side and not secret.
  # Security comes from Firestore rules and Google Cloud API restrictions,
  # not from hiding these keys.
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_FIREBASE_API_KEY,NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN,NEXT_PUBLIC_FIREBASE_PROJECT_ID,NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET,NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID,NEXT_PUBLIC_FIREBASE_APP_ID"
  # Disable the "smart" value-pattern detection that flags AIza* as secret.
  # Our Firebase web API key is public by design.
  SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"

[[plugins]]
  package = "@netlify/plugin-nextjs"
